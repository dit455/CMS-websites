# ─────────────────────────────────────────────────────────────────────────────
#  SITES CONFIGURATION  –  edit this file to add or remove frontend sites.
#
#  FORMAT:  PORT:FOLDER
#    PORT   = port number  (e.g. 5173, 5174, 5175 …)
#    FOLDER = folder name relative to the project root
#
#  HOW TO ADD A NEW SITE (one-time setup):
#    1. Copy the base template:
#           xcopy /E /I template-one react-mysite
#    2. Create its .env file:
#           echo VITE_API_BASE_URL=http://10.65.51.44:8000/api > react-mysite\.env
#           echo VITE_SITE_KEY=mysite                          >> react-mysite\.env
#    3. Install dependencies:
#           cd react-mysite && npm install
#    4. Register the site in Django admin → Sites → Add  (key = mysite)
#    5. Add a line below, then run start.bat — done!
# ─────────────────────────────────────────────────────────────────────────────

5173:template-one
